<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>


   <div  class="container">

    <div  class="inputContainer">
    <input  type="text"  placeholder="Enter your numbers"
     id ="input"  disabled>
   </div>

   <div class="optionContainer">

     <table  border="1">
        <tr>
            <td class="operator" onclick="addNumber('+')">+</td>
            <td class="operator" onclick="addNumber('-')">-</td>
            <td class="operator" onclick="addNumber('*')">*</td>
            <td class="operator" onclick="addNumber('/')">/</td>
        </tr>
             <tr>
            <td class="number" onclick="addNumber(7)">7</td>
            <td class="number" onclick="addNumber(8)">8</td>
            <td class="number" onclick="addNumber(9)">9</td>
            <td class="equal" rowspan="3"  onclick="calcAns()">=</td>
        </tr>
               <tr>
            <td class="number" onclick="addNumber(4)">4</td>
            <td class="number" onclick="addNumber(5)">5</td>
            <td class="number" onclick="addNumber(6)">6</td>
            
        </tr>
              <tr>
            <td class="number" onclick="addNumber(1)">1</td>
            <td class="number" onclick="addNumber(2)">2</td>
            <td class="number" onclick="addNumber(3)">3</td>
            
        </tr>
            <tr>
            <td class="number" onclick="addNumber(0)">0</td>
            <td class="number" onclick="addNumber('.')">.</td>
            <td class="clear" onclick="clearValue()">c</td>
            <td class="clear" onclick="clearAllValue()">AC</td>
            
            
        </tr>

            
     </table>  


   </div>
   </div>


    <script src="calculator.js"></script>
</body>
</html>
